run_name: halfcheetah_kl_seed0
env_id: HalfCheetah-v5
seed: 0
device: auto
out_dir: results
total_timesteps: 200000
rollout_steps: 2048
save_every: 25
coverage_bins: 50
model:
  hidden_sizes: [64, 64]
  log_std_init: -0.5
ppo:
  objective: kl
  lr: 0.0003
  epochs: 10
  minibatch_size: 256
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  target_kl: 0.02
  kl_coef: 1.0
  kl_adapt: true
  vf_coef: 0.5
  ent_coef: 0.0
  max_grad_norm: 0.5
  l1_coeff: 0.0
  l2_coeff: 0.0
  weight_decay: 0.0
shrink_perturb:
  enabled: false
  every_updates: 50
  shrink: 0.95
  perturb_std: 0.001
